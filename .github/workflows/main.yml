name: Relay Loop

on:
  workflow_dispatch:   # امکان اجرای دستی
  # schedule:
  #   - cron: '*/5 * * * *'  # اگر خواستید هر ۵ دقیقه یک نمونه تازه اجرا شود (توصیه نمی‌شود)

jobs:
  run-relay:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # حداکثر ۶ ساعت (محدودیت گیت‌هاب)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run relay script
        run: python main.py
